<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">KiCad Agent Pipeline Architecture</title>
  <desc id="desc">Architecture diagram for the KiCad agent pipeline, showing agent reasoning, KiCad automation, validation loops, and manufacturing artifacts.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#11172a"/>
      <stop offset="0.55" stop-color="#0e1321"/>
      <stop offset="1" stop-color="#101827"/>
    </linearGradient>
    <linearGradient id="lane" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#172238"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="box" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#23304f"/>
      <stop offset="1" stop-color="#1a243b"/>
    </linearGradient>
    <linearGradient id="accentBox" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#123b55"/>
      <stop offset="1" stop-color="#17243a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="13" markerHeight="13" refX="10" refY="6.5" orient="auto">
      <path d="M 0 0 L 13 6.5 L 0 13 z" fill="#4fc3f7"/>
    </marker>
    <marker id="greenArrow" markerWidth="13" markerHeight="13" refX="10" refY="6.5" orient="auto">
      <path d="M 0 0 L 13 6.5 L 0 13 z" fill="#66bb6a"/>
    </marker>
    <style>
      .bg { fill: url(#bg); }
      .title { fill: #f8fafc; font: 800 54px Arial, Helvetica, sans-serif; letter-spacing: 0; }
      .subtitle { fill: #a8b3c7; font: 500 22px Arial, Helvetica, sans-serif; }
      .lane { fill: url(#lane); stroke: #2c3d62; stroke-width: 2; rx: 18; filter: url(#shadow); }
      .lane-title { fill: #4fc3f7; font: 800 17px Arial, Helvetica, sans-serif; letter-spacing: 3px; }
      .lane-subtitle { fill: #dbe4f0; font: 700 26px Arial, Helvetica, sans-serif; }
      .box { fill: url(#box); stroke: #405b8b; stroke-width: 2; rx: 14; }
      .accent-box { fill: url(#accentBox); stroke: #4fc3f7; stroke-width: 2; rx: 14; }
      .green-box { fill: #182820; stroke: #66bb6a; stroke-width: 2; rx: 14; }
      .box-title { fill: #f8fafc; font: 800 24px Arial, Helvetica, sans-serif; }
      .box-text { fill: #c7d2e4; font: 500 17px Arial, Helvetica, sans-serif; }
      .box-muted { fill: #91a0b7; font: 500 15px Arial, Helvetica, sans-serif; }
      .code { fill: #9bdcff; font: 700 15px "SFMono-Regular", Consolas, monospace; }
      .arrow { stroke: #4fc3f7; stroke-width: 4; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
      .green-arrow { stroke: #66bb6a; stroke-width: 4; fill: none; marker-end: url(#greenArrow); stroke-linecap: round; stroke-linejoin: round; }
      .loop { stroke: #66bb6a; stroke-width: 3; fill: none; stroke-dasharray: 8 9; marker-end: url(#greenArrow); stroke-linecap: round; }
      .small-label { fill: #4fc3f7; font: 800 13px Arial, Helvetica, sans-serif; letter-spacing: 2px; }
      .pill { fill: #0f172a; stroke: #405b8b; stroke-width: 2; rx: 23; }
      .pill-text { fill: #eef2f7; font: 800 17px Arial, Helvetica, sans-serif; }
      .note { fill: #d5e6ff; font: 700 18px Arial, Helvetica, sans-serif; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="1000"/>
  <circle cx="1320" cy="110" r="240" fill="#16324a" opacity="0.17"/>
  <circle cx="155" cy="875" r="260" fill="#1d3b2b" opacity="0.12"/>

  <text class="title" x="70" y="78">KiCad Agent Pipeline Architecture</text>
  <text class="subtitle" x="72" y="119">Agents reason over sources and specs; deterministic KiCad tools mutate, validate, and export the hardware artifact.</text>

  <rect class="lane" x="60" y="155" width="455" height="650"/>
  <rect class="lane" x="572" y="155" width="455" height="650"/>
  <rect class="lane" x="1085" y="155" width="455" height="650"/>

  <text class="lane-title" x="92" y="203">LAYER 1</text>
  <text class="lane-subtitle" x="92" y="238">Agent reasoning</text>
  <text class="lane-title" x="604" y="203">LAYER 2</text>
  <text class="lane-subtitle" x="604" y="238">KiCad automation</text>
  <text class="lane-title" x="1117" y="203">LAYER 3</text>
  <text class="lane-subtitle" x="1117" y="238">Validation and export</text>

  <rect class="accent-box" x="92" y="275" width="390" height="90"/>
  <text class="box-title" x="120" y="314">User design goal</text>
  <text class="box-text" x="120" y="344">"Recreate My New Flame lamp"</text>

  <rect class="box" x="92" y="405" width="390" height="112"/>
  <text class="box-title" x="120" y="443">Research agents</text>
  <text class="box-text" x="120" y="473">Web, PDF, and image research</text>
  <text class="box-muted" x="120" y="498">source-tagged facts and open questions</text>

  <rect class="box" x="92" y="557" width="390" height="112"/>
  <text class="box-title" x="120" y="595">Design review agents</text>
  <text class="box-text" x="120" y="625">Spec normalizer, EE reviewer, critic</text>
  <text class="box-muted" x="120" y="650">reject unsafe or unsupported claims</text>

  <rect class="green-box" x="92" y="707" width="390" height="64"/>
  <text class="box-title" x="120" y="747">Branch gate: v5 modernized</text>

  <path class="arrow" d="M287 365 L287 397"/>
  <path class="arrow" d="M287 517 L287 549"/>
  <path class="green-arrow" d="M287 669 L287 699"/>

  <rect class="accent-box" x="604" y="275" width="390" height="92"/>
  <text class="box-title" x="632" y="314">Canonical spec</text>
  <text class="code" x="632" y="344">candle_spec_v5_modernized.md</text>

  <rect class="box" x="604" y="407" width="390" height="106"/>
  <text class="box-title" x="632" y="444">Board generator</text>
  <text class="code" x="632" y="474">tools/generate_candle.py</text>
  <text class="box-muted" x="632" y="498">schematic, PCB, footprints, placement</text>

  <rect class="box" x="604" y="553" width="390" height="106"/>
  <text class="box-title" x="632" y="590">KiCad project files</text>
  <text class="code" x="632" y="620">.kicad_sch + .kicad_pcb</text>
  <text class="box-muted" x="632" y="644">430 x 30 mm, 4-layer LED stem board</text>

  <rect class="box" x="604" y="699" width="390" height="74"/>
  <text class="box-title" x="632" y="737">KiCad CLI and scripts</text>
  <text class="box-muted" x="632" y="761">ERC, DRC, plots, netlist, 3D assets</text>

  <path class="arrow" d="M482 739 C535 739 545 321 596 321"/>
  <path class="arrow" d="M799 367 L799 399"/>
  <path class="arrow" d="M799 513 L799 545"/>
  <path class="arrow" d="M799 659 L799 691"/>

  <rect class="accent-box" x="1117" y="275" width="390" height="120"/>
  <text class="box-title" x="1145" y="313">DRC recovery loop</text>
  <text class="box-text" x="1145" y="343">run DRC - inspect - patch board</text>
  <text class="box-text" x="1145" y="369">measure delta - keep or revert</text>
  <path class="loop" d="M1458 306 C1505 330 1505 378 1458 389"/>

  <rect class="box" x="1117" y="435" width="390" height="104"/>
  <text class="box-title" x="1145" y="472">Export agent</text>
  <text class="code" x="1145" y="502">tools/export_candle.py</text>
  <text class="box-muted" x="1145" y="524">snapshots project before KiCad export</text>

  <rect class="green-box" x="1117" y="579" width="390" height="112"/>
  <text class="box-title" x="1145" y="617">Manufacturing outputs</text>
  <text class="box-text" x="1145" y="647">Gerbers, drills, BOM, position CSV</text>
  <text class="box-muted" x="1145" y="672">fabrication ZIP, GLB, STEP, PDFs</text>

  <rect class="box" x="1117" y="731" width="390" height="48"/>
  <text class="box-title" x="1145" y="763">React/Vite replay UI for judges</text>

  <path class="arrow" d="M994 736 C1050 736 1054 335 1109 335"/>
  <path class="green-arrow" d="M1312 395 L1312 427"/>
  <path class="green-arrow" d="M1312 539 L1312 571"/>
  <path class="arrow" d="M1312 691 L1312 723"/>

  <rect x="60" y="845" width="1480" height="104" rx="18" fill="#111827" stroke="#2c3d62" stroke-width="2"/>
  <text class="small-label" x="92" y="883">AUDITABLE HANDOFF CHAIN</text>

  <rect class="pill" x="92" y="902" width="172" height="46"/>
  <text class="pill-text" x="129" y="932">Intent</text>
  <rect class="pill" x="286" y="902" width="206" height="46"/>
  <text class="pill-text" x="318" y="932">Research brief</text>
  <rect class="pill" x="514" y="902" width="210" height="46"/>
  <text class="pill-text" x="546" y="932">Canonical spec</text>
  <rect class="pill" x="746" y="902" width="186" height="46"/>
  <text class="pill-text" x="784" y="932">KiCad board</text>
  <rect class="pill" x="954" y="902" width="170" height="46"/>
  <text class="pill-text" x="995" y="932">Clean DRC</text>
  <rect class="pill" x="1146" y="902" width="190" height="46"/>
  <text class="pill-text" x="1186" y="932">Fab bundle</text>
  <rect class="pill" x="1358" y="902" width="140" height="46"/>
  <text class="pill-text" x="1395" y="932">Demo UI</text>

  <path class="arrow" d="M264 925 L278 925"/>
  <path class="arrow" d="M492 925 L506 925"/>
  <path class="arrow" d="M724 925 L738 925"/>
  <path class="arrow" d="M932 925 L946 925"/>
  <path class="green-arrow" d="M1124 925 L1138 925"/>
  <path class="arrow" d="M1336 925 L1350 925"/>

  <text class="note" x="70" y="975">Core idea: agents do not stop at text. They operate KiCad artifacts, read tool failures, and keep iterating until exportable hardware files exist.</text>
</svg>
